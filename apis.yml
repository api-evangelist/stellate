aid: stellate
name: Stellate
description: |
  Stellate is a GraphQL edge caching and API management platform that caches
  GraphQL query results at 60 data centers worldwide, reducing origin traffic
  by up to 95% and delivering responses in milliseconds. The platform provides
  edge caching, real-time metrics and insights, rate limiting, and security
  features to help teams scale, protect, and optimize their GraphQL APIs.
