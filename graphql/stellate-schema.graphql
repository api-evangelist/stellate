input NegatedCountryCodeFilterConstraint {
  in: [CountryCode!]
}

input NegatedErrorFilterConstraint {
  in: [RequestsErrorKind!]
}

input NegatedOperationKindFilterConstraint {
  equal: OperationKind
}

input NegatedRequestTypeFilterConstraint {
  in: [RequestType!]
}

input NegatedStringArrayFilterConstraint {
  all: [String!]
  any: [String!]
}

input NegatedStringFilterConstraint {
  equal: String
  in: [String!]
  isNull: Boolean
}

interface Node {
  id: ID!
}

enum OperationKind {
  MUTATION
  QUERY
}

input OperationKindFilterConstraint {
  NOT: NegatedOperationKindFilterConstraint
  equal: OperationKind
}

"""Organizations are the root level entity that contains Services and grants Users access to them."""
type Organization implements Node {
  id: ID!
  name: String!
  services(after: String, before: String, filter: ServiceFilter, first: Int, last: Int): OrganizationServicesConnection!
  slug: String!
}

type OrganizationServicesConnection {
  edges: [OrganizationServicesConnectionEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type OrganizationServicesConnectionEdge {
  cursor: String!
  node: Service
}

type OrganizationsConnection {
  edges: [OrganizationsConnectionEdge]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type OrganizationsConnectionEdge {
  cursor: String!
  node: Organization!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

"""An operation that is allowed to be sent as a hash to the CDN, the CDN will internally translate this hash for the caching/purging translation and metrics."""
type PersistedOperation implements Node {
  createdAt: DateTime!
  hash: String!
  id: ID!
  lastSeen: DateTime
  operationName: String!
  query: String!
  updatedAt: DateTime!
}

input PersistedOperationsInput {
  hash: String!
  query: String!
}

type Query {
  alert(id: ID!): Alert
  organization(id: ID, slug: String): Organization
  """Retrieves all `Organization`s the currently authenticated user is a member of."""
  organizations(after: String, before: String, first: Int, last: Int): OrganizationsConnection
  service(name: ServiceName!): Service
}

"""Indicates the type of the request, if it was a normal GQL request, Automatic Persisted Query, or Persisted Operation."""
enum RequestType {
  APQ
  NORMAL
  PO
}

input RequestTypeFilterConstraint {
  NOT: NegatedRequestTypeFilterConstraint
  equal: RequestType
  in: [RequestType!]
}

enum RequestsErrorKind {
  GRAPHQL
  STATUS_CODE_4XX
  STATUS_CODE_5XX
}

input RequestsErrorKindFilterConstraint {
  NOT: NegatedErrorFilterConstraint
  equal: RequestsErrorKind
  in: [RequestsErrorKind!]
}

"""A service represents a configuration for a single origin service, belonging to an `Organization`"""
type Service implements Node {
  """The URI of the origin endpoint that is shielded by this `Service`"""
  cdnEndpoint: String!
  id: ID!
  metrics(filter: MetricsRequestsFilter, timeInterval: MetricsTimeIntervalFilter): Metrics!
  name: ServiceName!
  organization: Organization
  persistedOperations(after: String, before: String, first: Int, last: Int): ServicePersistedOperationsConnection!
}

input ServiceFilter {
  field: ServiceFilterField!
  value: String!
}

enum ServiceFilterField {
  NAME
}

"""A case-insensitive name for a Stellate service, which must be a valid subdomain on *.stellate.sh or *.graphcdn.app"""
scalar ServiceName

type ServicePersistedOperationsConnection {
  edges: [ServicePersistedOperationsConnectionEdge]!
  pageInfo: PageInfo!
}

type ServicePersistedOperationsConnectionEdge {
  cursor: String!
  node: PersistedOperation!
}

enum SortDirection {
  ASC
  DESC
}

input StringArrayFilterConstraint {
  NOT: NegatedStringArrayFilterConstraint
  all: [String!]
  any: [String!]
  search: String
}

input StringFilterConstraint {
  NOT: NegatedStringFilterConstraint
  equal: String
  in: [String!]
  isNull: Boolean
}

input StringFilterWithSearchConstraint {
  NOT: NegatedStringFilterConstraint
  equal: String
  in: [String!]
  isNull: Boolean
  search: String
}

type StringMapEntry {
  key: String!
  value: String!
}

input SubmitApiFeedbackInput {
  email: String!
  feedback: String!
}

"""A `User` represents an active account profile within Stellate."""
type User implements Node {
  id: ID!
}
