"""An Alert allows you to configure when to send alerts, which criteria trigger alerts in the first place, and who should be notified. Learn more in our [`Alert` documentation](https://docs.stellate.co/docs/alerts)"""
type Alert implements Node {
  filters: [AlertFilter!]!
  id: ID!
  interval: AlertInterval!
  """Number of times this alert has fired in the specified timeframe."""
  invocationCount(since: AlertLastSeenInterval): Int!
  name: String
  notifications: [AlertNotification!]!
  threshold: Float!
  thresholdDirection: AlertThresholdDirection!
  thresholdType: AlertThresholdType!
  type: AlertType!
}

"""Allows to include or exclude specific GraphQL errors based on the error message or error code."""
type AlertFilter {
  id: ID!
  scope: AlertFilterScope!
  type: AlertFilterType!
  value: String!
}

enum AlertFilterScope {
  EXCLUDE
  INCLUDE
}

enum AlertFilterType {
  CODE
  PATH
}

enum AlertInterval {
  T_1_MINUTE
  T_1_HOUR
  T_5_MINUTES
  T_10_MINUTES
  T_12_HOURS
  T_15_MINUTES
  T_24_HOURS
  T_30_MINUTES
}

enum AlertLastSeenInterval {
  T_1_DAY
  T_1_MONTH
  T_1_WEEK
}

type AlertNotification {
  """Only available if `type` is `CustomEmail`"""
  email: String
  """Only available if `type` is `Email`"""
  emailTo: User
  id: ID!
  type: AlertNotificationType!
}

"""You can learn more about how to configure your notificatin targets in our [`Alert` documentation](https://docs.stellate.co/docs/alerts#notification-targets)"""
enum AlertNotificationType {
  CUSTOM_EMAIL
  EMAIL
  SLACK
}

enum AlertThresholdDirection {
  ABOVE
  BELOW
}

enum AlertThresholdType {
  ABSOLUTE
  RELATIVE
}

enum AlertType {
  ERROR_4XX
  ERROR_5XX
  ERROR_GRAPHQL
  MUTATION_DURATION_P95
  QUERY_DURATION_P95
}

