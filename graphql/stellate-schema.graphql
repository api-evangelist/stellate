scalar Json

type Metrics {
  byBrowser(after: String, first: Int!): MetricsByBrowserConnection
  byContinent: MetricsByContinentConnection
  byCountry(after: String, first: Int!): MetricsByCountryConnection
  byCustomAttribute(after: String, first: Int!): MetricsByCustomAttributeConnection
  byCustomAttributeValue(after: String, first: Int!, name: String!): MetricsByCustomAttributeValueConnection
  byDeviceCategory(after: String, first: Int!): MetricsByDeviceCategoryConnection
  byErrorCode(after: String, first: Int!, sort: MetricsSort): MetricsByErrorCodeConnection
  byField(after: String, fields: [String!], first: Int!, sort: MetricsSort, unusedFields: Boolean): MetricsByFieldConnection
  byGraphqlClient(after: String, first: Int!, sort: MetricsSort): MetricsByGraphqlClientConnection
  byGraphqlClientVersion(after: String, first: Int!, sort: MetricsSort): MetricsByGraphqlClientVersionConnection
  byOperation(after: String, first: Int!, groupByOperationName: Boolean, operationKind: OperationKind, sort: MetricsSort): MetricsByOperationConnection
  byTypeName(after: String, first: Int!, sort: MetricsSort, unusedTypes: Boolean): MetricsByTypeNameConnection
  end: DateTime!
  errors(after: String, first: Int!, sortBy: MetricsErrorsSortBy! = TIMESTAMP, sortDirection: SortDirection! = DESC): MetricsErrorsConnection
  requests(after: String, first: Int!, sortBy: MetricsRequestSortBy! = TIMESTAMP, sortDirection: SortDirection! = DESC): MetricsRequestsConnection
  start: DateTime!
  summary: MetricsGroupedRow
}

